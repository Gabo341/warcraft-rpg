<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />

    <!--
      viewport: garante que o layout funcione corretamente
      em dispositivos móveis — sem isso a página fica "zoom out"
      no celular.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Warcraft — O Caminho do Herói</title>

    <!--
      Favicon padrão do Angular CLI.
      Pode trocar pelo ícone do jogo depois.
    -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <!--
      Fontes do design system (home_and_design.html).
      Carregadas aqui no index.html para ficarem disponíveis
      em TODOS os componentes da aplicação sem repetição.

      - Cinzel Decorative → títulos principais (h1, nomes de atos)
      - Cinzel            → labels, botões, eyebrows, slugs
      - Crimson Pro       → texto narrativo, descrições (corpo)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
            href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap"
            rel="stylesheet"
    />
</head>

<body>
<!--
  <app-root> é o seletor do AppComponent (app.component.ts).
  O Angular substitui esta tag pelo template do AppComponent,
  que contém o <router-outlet> — onde cada tela do jogo
  é renderizada conforme a rota ativa.

  Tudo que o usuário vê é renderizado DENTRO deste elemento.
-->
<app-root></app-root>
</body>
</html>
